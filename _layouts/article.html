<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | DIGITAL.DZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; line-height: 1.8; color: #333; }
        .content p { margin-bottom: 1.5rem; font-size: 1.15rem; color: #444; }
        .content h2 { font-weight: 800; font-size: 1.8rem; margin-top: 2.5rem; color: #000; border-left: 4px solid #2563eb; padding-left: 15px; }
    </style>
</head>
<body class="bg-white">
    <nav class="border-b border-gray-100 py-6 sticky top-0 bg-white/95 backdrop-blur-sm z-50">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="{{ site.baseurl }}/" class="text-2xl font-black text-blue-600 tracking-tighter italic">DIGITAL.DZ</a>
            <a href="{{ site.baseurl }}/" class="text-xs font-bold text-gray-400 hover:text-blue-600 uppercase tracking-widest">Accueil</a>
        </div>
    </nav>
    <article class="max-w-3xl mx-auto px-4 py-12">
        <span class="text-blue-600 font-bold text-xs uppercase tracking-widest mb-4 block">{{ page.category }}</span>
        <h1 class="text-3xl md:text-5xl font-extrabold text-gray-900 leading-tight mb-8">{{ page.title }}</h1>
        <div class="flex items-center text-[11px] font-bold text-gray-400 border-b border-gray-100 pb-8 mb-10 uppercase tracking-widest">
            <span>{{ page.date | date: "%d/%m/%Y" }}</span>
            <span class="mx-4">•</span>
            <span class="text-blue-600">{% assign words = content | number_of_words %}{{ words | divided_by: 200 | plus: 1 }} min lecture</span>
        </div>
        {% if page.image %}<img src="{{ page.image | relative_url }}" class="w-full rounded-2xl mb-12 shadow-sm">{% endif %}
        <div class="content">{{ content }}</div>
    </article>
</body>
</html>
